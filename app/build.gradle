plugins {
    id "com.android.application"
}

android {
    namespace "com.codex.guandan"
    compileSdk 35

    defaultConfig {
        applicationId "com.codex.guandan"
        minSdk 24
        targetSdk 35
        versionCode 3
        versionName "1.1.1-xiaomi15ultra-fix"
    }

    sourceSets {
        main {
            manifest.srcFile "src/main/AndroidManifestSafe.xml"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}
